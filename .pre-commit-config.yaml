# One-time setup:  pip install pre-commit  &&  pre-commit install
# Runs the same formatters/linters on changed files before each commit.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: python3 -m ruff check --fix
        language: system
        types: [python]
        exclude: ^old_odev\.py$
      - id: ruff-format
        name: ruff (format)
        entry: python3 -m ruff format
        language: system
        types: [python]
        exclude: ^old_odev\.py$
      - id: prettier
        name: prettier
        entry: npx --yes prettier@3 --write
        language: system
        files: \.(js|css|html|json|md)$
        exclude: ^static/(lib|dist)/
      - id: eslint
        name: eslint
        entry: npx --yes eslint --fix
        language: system
        files: ^static/src/.*\.js$
      # Keep the committed bundle in step with source: whenever static/src/ or
      # vendor/owl-orm/ change, rebuild static/dist/app.js and stage it, so a stale
      # bundle can never be committed. Runs once (not per-file); fails the commit if
      # the build errors. Runs after prettier/eslint so it bundles the fixed source.
      - id: build-bundle
        name: build frontend bundle (static/dist/app.js)
        entry: bash -c 'npm run build && git add static/dist/app.js'
        language: system
        files: ^(static/src/|vendor/owl-orm/)
        pass_filenames: false
